<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Pointage</title>
    <link rel="stylesheet" href="styles.css?v=13">
    <script>
    // Auto-updater: vérifie si une nouvelle version du HTML existe sur le serveur
    // Si oui, force un rechargement. Empêche les boucles avec sessionStorage.
    (function(){
        var CURRENT_VERSION = '13';
        var reloadKey = 'pointage_reload_v' + CURRENT_VERSION;
        if (sessionStorage.getItem(reloadKey)) return; // déjà rechargé cette session
        fetch(location.pathname + '?_vc=' + Date.now(), {cache:'no-store'})
        .then(function(r){return r.text()})
        .then(function(html){
            var m = html.match(/CURRENT_VERSION\s*=\s*'(\d+)'/);
            if(m && m[1] !== CURRENT_VERSION){
                sessionStorage.setItem('pointage_reload_v'+m[1],'1');
                location.reload(true);
            }
        }).catch(function(){});
    })();
    </script>
</head>
<body>
    <div class="page-wrapper">
        <div class="top-bar">
            <h1>Pointage</h1>
            <div class="top-bar-right">
                <span id="syncIndicator" class="sync-indicator hidden"></span>
                <a href="admin.html">Admin</a>
            </div>
        </div>

        <div class="main-content">
            <div class="employee-card">
                <!-- Sélection employé -->
                <div class="select-group">
                    <label for="empSelect">Qui es-tu?</label>
                    <select id="empSelect" class="big-select">
                        <option value="">-- Choisis ton nom --</option>
                    </select>
                </div>

                <!-- Bouton Timbrer -->
                <button id="timbrBtn" class="timbrer-btn" disabled>TIMBRER</button>

                <!-- Status -->
                <div class="status-bar">
                    <div class="status-main" id="statusMain">Choisis ton nom pour commencer</div>
                    <div class="status-sub" id="statusSub"></div>
                </div>

                <!-- Timbrages du jour -->
                <div class="today-section">
                    <h3>Aujourd'hui</h3>
                    <div id="todayTimings">
                        <div class="empty-state">Choisis ton nom</div>
                    </div>
                    <div id="todayTotal" class="today-total" style="display:none;"></div>
                </div>

                <!-- BALANCE JOUR PAR JOUR (compact, pas de gros négatif) -->
                <div id="empBalanceSection" class="balance-section-emp" style="display:none;">
                    <h3 id="balanceTitle">Ma balance</h3>
                    <!-- Balance actuelle en gros -->
                    <div id="currentBalance" class="current-balance"></div>
                    <!-- Barre de progression mensuelle -->
                    <div class="progress-bar-container" style="margin-top:12px;">
                        <div class="progress-bar-fill" id="progressBarFill"></div>
                        <span class="progress-bar-label" id="progressBarLabel">0%</span>
                    </div>
                    <!-- Aujourd'hui résumé -->
                    <div id="todaySummary" class="today-summary"></div>
                </div>

                <!-- Historique (caché par défaut) -->
                <div class="history-toggle" id="historyToggle" style="display:none;">
                    <button class="btn-link" onclick="toggleHistory()">Voir le détail jour par jour</button>
                </div>
                <div id="historySection" class="history-section" style="display:none;">
                    <div id="historyContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=13"></script>
    <script>
        const empSelect = document.getElementById('empSelect');
        const timbrBtn = document.getElementById('timbrBtn');
        const statusMain = document.getElementById('statusMain');
        const statusSub = document.getElementById('statusSub');
        const todayTimings = document.getElementById('todayTimings');
        const todayTotal = document.getElementById('todayTotal');

        let selectedEmpId = null;
        let nextType = 'ENTRÉE';

        function loadEmployees() {
            const employees = Storage.getEmployees();
            empSelect.innerHTML = '<option value="">-- Choisis ton nom --</option>';
            employees.forEach(emp => {
                const opt = document.createElement('option');
                opt.value = emp.id; opt.textContent = emp.name;
                empSelect.appendChild(opt);
            });
            if (employees.length === 0) {
                statusMain.textContent = 'Aucun employé configuré';
                statusSub.textContent = 'Le gestionnaire doit ajouter les employés (page Admin)';
            }
        }

        empSelect.addEventListener('change', () => {
            selectedEmpId = empSelect.value;
            if (!selectedEmpId) {
                timbrBtn.disabled = true;
                timbrBtn.className = 'timbrer-btn';
                timbrBtn.textContent = 'TIMBRER';
                statusMain.textContent = 'Choisis ton nom pour commencer';
                statusSub.textContent = '';
                todayTimings.innerHTML = '<div class="empty-state">Choisis ton nom</div>';
                todayTotal.style.display = 'none';
                document.getElementById('empBalanceSection').style.display = 'none';
                document.getElementById('historyToggle').style.display = 'none';
                document.getElementById('historySection').style.display = 'none';
                return;
            }
            refreshStatus();
            refreshToday();
        });

        function refreshStatus() {
            if (!selectedEmpId) return;
            const last = Storage.getLastTimbre(selectedEmpId);
            const empName = empSelect.options[empSelect.selectedIndex].text;
            const lastType = last ? (last.type || '') : '';

            if (!last || lastType === 'SORTIE') {
                nextType = 'ENTRÉE';
                timbrBtn.textContent = 'ENTRÉE';
                timbrBtn.className = 'timbrer-btn';
                statusMain.textContent = empName + ' — prochaine action : ENTRÉE';
                statusSub.textContent = last ? 'Dernière sortie : ' + last.time : 'Aucun timbre enregistré';
            } else if (lastType === 'ENTRÉE') {
                nextType = 'SORTIE';
                timbrBtn.textContent = 'SORTIE';
                timbrBtn.className = 'timbrer-btn is-sortie';
                statusMain.textContent = empName + ' — prochaine action : SORTIE';
                statusSub.textContent = 'Entré(e) à ' + last.time;
            } else {
                nextType = 'ENTRÉE';
                timbrBtn.textContent = 'ENTRÉE';
                timbrBtn.className = 'timbrer-btn';
                statusMain.textContent = empName + ' — prochaine action : ENTRÉE';
                statusSub.textContent = '';
            }
            timbrBtn.disabled = false;
        }

        function refreshToday() {
            if (!selectedEmpId) return;
            const today = todayStr();
            const timbrages = Storage.getTimbragesByEmpAndDate(selectedEmpId, today);
            todayTimings.innerHTML = '';

            if (timbrages.length === 0) {
                todayTimings.innerHTML = '<div class="empty-state">Aucun timbre aujourd\'hui</div>';
                todayTotal.style.display = 'none';
            } else {
                timbrages.forEach(t => {
                    const isEntry = t.type === 'ENTRÉE';
                    const row = document.createElement('div');
                    row.className = 'timing-row';
                    row.innerHTML = '<span class="dot ' + (isEntry ? 'entry' : 'exit') + '"></span>' +
                        '<span class="time">' + t.time + '</span>' +
                        '<span class="type">' + t.type + '</span>';
                    todayTimings.appendChild(row);
                });

                const totalH = getWorkedHoursForDay(selectedEmpId, today);
                if (totalH > 0) {
                    todayTotal.textContent = 'Total aujourd\'hui : ' + formatHours(totalH);
                    todayTotal.style.display = 'block';
                } else {
                    todayTotal.style.display = 'none';
                }
            }

            try { refreshBalance(); } catch(e) { console.warn('refreshBalance error:', e); }
        }

        function refreshBalance() {
            if (!selectedEmpId) return;
            const info = getEmployeeMonthInfo(selectedEmpId);
            const section = document.getElementById('empBalanceSection');
            section.style.display = 'block';
            document.getElementById('historyToggle').style.display = 'block';

            // Titre (mois seulement, sans pourcentage)
            document.getElementById('balanceTitle').textContent = monthNameFr(info.ym);

            // Barre de progression masquée
            var progressBar = document.getElementById('progressBarFill');
            if (progressBar && progressBar.parentElement) progressBar.parentElement.style.display = 'none';
            var progressLabel = document.getElementById('progressBarLabel');
            if (progressLabel) progressLabel.style.display = 'none';

            // Balance actuelle (le chiffre principal que l'employé voit)
            const balDiv = document.getElementById('currentBalance');

            if (!info.hasTimbrages) {
                balDiv.className = 'current-balance balance-zero';
                balDiv.innerHTML = '<span class="balance-label">Balance</span><span class="balance-number">00:00</span>';
            } else {
                const bal = info.runningBalance;
                const isPositive = bal >= 0;
                balDiv.className = 'current-balance ' + (isPositive ? 'balance-positive-bg' : 'balance-negative-bg');
                balDiv.innerHTML = '<span class="balance-label">Balance</span>' +
                    '<span class="balance-number">' + formatBalanceCompact(bal) + '</span>';
            }

            // Résumé aujourd'hui — masqué
            const todayDiv = document.getElementById('todaySummary');
            todayDiv.style.display = 'none';
        }

        function toggleHistory() {
            const section = document.getElementById('historySection');
            const isVisible = section.style.display !== 'none';
            section.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) loadHistory();
        }

        function loadHistory() {
            if (!selectedEmpId) return;
            const info = getEmployeeMonthInfo(selectedEmpId);
            const container = document.getElementById('historyContent');
            container.innerHTML = '';

            if (!info.hasTimbrages || info.dailyDetails.length === 0) {
                container.innerHTML = '<div class="empty-state">Aucun timbrage ce mois</div>';
                return;
            }

            // Afficher jour par jour (le plus récent en premier)
            const days = [...info.dailyDetails].reverse();
            days.forEach(day => {
                const timbrages = Storage.getTimbragesByEmpAndDate(selectedEmpId, day.date);
                const dayDiv = document.createElement('div');
                dayDiv.className = 'history-day';

                const balClass = day.runningBalance >= 0 ? 'balance-positive' : 'balance-negative';
                const dayBalClass = day.dayBalance >= 0 ? 'balance-positive' : 'balance-negative';

                let html = '<div class="history-day-header">' +
                    '<span>' + formatDateDisplay(day.date) + '</span>' +
                    '<span class="' + dayBalClass + '" style="font-weight:600;">' + formatBalanceCompact(day.dayBalance) + '</span>' +
                    '<strong class="' + balClass + '">' + formatBalanceCompact(day.runningBalance) + '</strong></div>';

                if (day.holidayHours > 0) {
                    html += '<div class="history-day-detail"><span>' + formatHours(day.holidayHours) + ' férié</span></div>';
                }

                html += '<div class="history-day-entries">';
                timbrages.forEach(t => {
                    const icon = t.type === 'ENTRÉE' ? '&#9654;' : '&#9632;';
                    html += '<span class="history-entry">' + icon + ' ' + t.time + '</span>';
                });
                html += '</div>';

                dayDiv.innerHTML = html;
                container.appendChild(dayDiv);
            });
        }

        // ── Cliquer sur TIMBRER ──
        timbrBtn.addEventListener('click', () => {
            if (!selectedEmpId || !nextType) return;
            timbrBtn.disabled = true;
            const empName = empSelect.options[empSelect.selectedIndex].text;
            const date = todayStr();
            const time = nowTimeStr();

            Storage.addTimbre(selectedEmpId, empName, nextType, date, time, 'system', '');

            const justRegisteredType = nextType;
            const nextTypeAfterClick = (justRegisteredType === 'ENTRÉE') ? 'SORTIE' : 'ENTRÉE';

            timbrBtn.className = 'timbrer-btn flash-success';
            timbrBtn.textContent = justRegisteredType + ' OK';
            statusMain.textContent = justRegisteredType + ' enregistrée pour ' + empName;

            setTimeout(() => {
                try { refreshStatus(); } catch(e) { console.warn('refreshStatus error:', e); }
                try { refreshToday(); } catch(e) { console.warn('refreshToday error:', e); }
                if (nextType !== nextTypeAfterClick) {
                    nextType = nextTypeAfterClick;
                    timbrBtn.textContent = nextType;
                    timbrBtn.className = (nextType === 'SORTIE') ? 'timbrer-btn is-sortie' : 'timbrer-btn';
                }
            }, 1500);
        });

        // ── Init ──
        async function init() {
            const updated = await GitSync.init();
            loadEmployees();
            if (updated) loadEmployees();
            GitSync.startAutoSync();
        }
        init();
    </script>
</body>
</html>
